# Flyway configuration — Flyway OWNS the schema; the app never auto-migrates.
# Usage: flyway -configFiles=flyway.conf migrate
# Connection + password come from env/CLI flags (FLYWAY_URL, FLYWAY_USER, FLYWAY_PASSWORD)
# or Cloud SQL Auth Proxy — never commit credentials here.
flyway.locations=filesystem:docs/data-model/migrations
flyway.baselineOnMigrate=false
flyway.validateOnMigrate=true
