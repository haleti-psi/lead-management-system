# One-time: rename the demo login usernames to email style (@primesoft.net).
# Passwords are untouched (still Demo@12345). Idempotent: re-running is a no-op
# once the old usernames no longer exist. Run:
#   gcloud builds submit --config=cloudbuild-rename-users.yaml --project wealthmanagement-491511 .
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/lms-db-password/versions/latest
      env: 'DB_PASSWORD'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: start-proxy
    args:
      - 'run'
      - '-d'
      - '--name=csql-proxy'
      - '--network=cloudbuild'
      - 'gcr.io/cloud-sql-connectors/cloud-sql-proxy:latest'
      - '--address=0.0.0.0'
      - '--port=5432'
      - 'wealthmanagement-491511:asia-southeast1:wealth-management'

  - name: 'postgres:17-alpine'
    id: rename
    waitFor: ['start-proxy']
    secretEnv: ['DB_PASSWORD']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -e
        export PGPASSWORD="$${DB_PASSWORD}"
        PSQL="psql -h csql-proxy -p 5432 -U lms_app -d lms -v ON_ERROR_STOP=1"
        $$PSQL -c "UPDATE users SET username='bm@primesoft.net', email='bm@primesoft.net' WHERE username='bm';"
        $$PSQL -c "UPDATE users SET username='rm@primesoft.net', email='rm@primesoft.net' WHERE username='rm';"
        echo '--- users after rename ---'
        $$PSQL -c "SELECT username, email, status FROM users ORDER BY username;"

timeout: 300s
